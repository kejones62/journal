<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 16px; max-width: 500px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 16px; color: #333; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 12px; }
    input, select, textarea { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; background: white; }
    textarea { min-height: 120px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .ai-status { font-size: 12px; color: #888; margin-top: 4px; min-height: 18px; }
    button { width: 100%; margin-top: 20px; padding: 14px; font-size: 16px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:disabled { background: #aaa; }
    #status { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 14px; display: none; text-align: center; }
    .ok { background: #e6f4ea; color: #1e7e34; display: block !important; }
    .err { background: #fce8e6; color: #c5221f; display: block !important; }
  </style>
</head>
<body>
  <h1>Journal</h1>

  <label>Entry</label>
  <textarea id="entry" placeholder="What happened?" oninput="scheduleClassify()"></textarea>
  <div class="ai-status" id="ai-status"></div>

  <div class="row">
    <div>
      <label>Topic</label>
      <select id="topic" onchange="updateSubtopics(true)">
        <option>Vehicle</option>
        <option>Home</option>
        <option>Shop</option>
        <option>Rocketry</option>
        <option>Garden</option>
        <option>Health</option>
        <option selected>Other</option>
      </select>
    </div>
    <div>
      <label>Subtopic</label>
      <select id="subtopic"></select>
    </div>
  </div>

  <label>Date</label>
  <input type="text" id="date" placeholder="MM/DD/YYYY" />

  <button id="submitBtn" onclick="submitEntry()">Log Entry</button>
  <div id="status"></div>

  <script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxGI667BeCLPA5-TqFRWEWjPrdfBpbZV6nZAnKtngt1LbMXm5ECLNRlE2UOOsHKTDHg/exec";
    const KEY = "Journal123!";
    const SUBTOPICS = {
      Vehicle: ["Tacoma","Corolla","Other"],
      Home: ["Fort Mohave","Forest Grove","General"],
      Shop: ["Laser Cutter","3D Printer","Electronics","General"],
      Rocketry: ["Flight","Motor","Parachute","OROC","General"],
      Garden: ["Fort Mohave","Forest Grove"],
      Health: ["General"],
      Other: ["General"]
    };

    let classifyTimer = null;
    let userOverrode = false;

    function today() {
      const d = new Date();
      return [String(d.getMonth()+1).padStart(2,"0"), String(d.getDate()).padStart(2,"0"), d.getFullYear()].join("/");
    }

    function updateSubtopics(manual) {
      if (manual) userOverrode = true;
      const topic = document.getElementById("topic").value;
      const sel = document.getElementById("subtopic");
      const current = sel.value;
      sel.innerHTML = SUBTOPICS[topic].map(s => `<option>${s}</option>`).join("");
      if (SUBTOPICS[topic].includes(current)) sel.value = current;
    }

    function setClassification(topic, subtopic) {
      if (userOverrode) return;
      const topicSel = document.getElementById("topic");
      topicSel.value = topic;
      updateSubtopics(false);
      const subtopicSel = document.getElementById("subtopic");
      if (SUBTOPICS[topic] && SUBTOPICS[topic].includes(subtopic)) {
        subtopicSel.value = subtopic;
      }
    }

    function scheduleClassify() {
      userOverrode = false;
      clearTimeout(classifyTimer);
      const entry = document.getElementById("entry").value.trim();
      if (entry.length < 10) return;
      classifyTimer = setTimeout(() => classify(entry), 1000);
    }

    async function classify(entry) {
      const aiStatus = document.getElementById("ai-status");
      aiStatus.textContent = "Categorizing...";
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 100,
            system: `You categorize journal entries. Reply with ONLY a JSON object like {"topic":"X","subtopic":"Y"}.
Topics and subtopics:
- Vehicle: Tacoma, Corolla, Other
- Home: Fort Mohave, Forest Grove, General
- Shop: Laser Cutter, 3D Printer, Electronics, General
- Rocketry: Flight, Motor, Parachute, OROC, General
- Garden: Fort Mohave, Forest Grove
- Health: General
- Other: General
If unsure, use Other/General.`,
            messages: [{ role: "user", content: entry }]
          })
        });
        const data = await res.json();
        const text = data.content[0].text.trim();
        const parsed = JSON.parse(text);
        setClassification(parsed.topic, parsed.subtopic);
        aiStatus.textContent = "Auto-categorized (change above if wrong)";
      } catch(e) {
        aiStatus.textContent = "";
      }
    }

    async function submitEntry() {
      const btn = document.getElementById("submitBtn");
      const status = document.getElementById("status");
      const date = document.getElementById("date").value.trim();
      const entry = document.getElementById("entry").value.trim();
      if (!date || !entry) {
        status.className = "err";
        status.textContent = "Date and entry are required.";
        return;
      }
      btn.disabled = true;
      btn.textContent = "Logging...";
      status.className = "";
      try {
        const res = await fetch(SHEET_URL, {
          method: "POST",
          body: JSON.stringify({
            key: KEY,
            date,
            topic: document.getElementById("topic").value,
            subtopic: document.getElementById("subtopic").value,
            entry
          })
        });
        const data = await res.json();
        if (data.result === "success") {
          status.className = "ok";
          status.textContent = "Logged.";
          document.getElementById("entry").value = "";
          document.getElementById("date").value = today();
          userOverrode = false;
          document.getElementById("ai-status").textContent = "";
          updateSubtopics(false);
        } else {
          throw new Error(data.error || "Unknown error");
        }
      } catch(e) {
        status.className = "err";
        status.textContent = "Error: " + e.message;
      }
      btn.disabled = false;
      btn.textContent = "Log Entry";
    }

    document.getElementById("date").value = today();
    updateSubtopics(false);
  </script>
</body>
</html>
